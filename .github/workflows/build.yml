name: BuildJet Kernel

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    name: Build Surya Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      - name: Prepare timezone
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Jakarta date '+%d%m%Y-%H%M')" >> $GITHUB_ENV
          sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y bc cpio flex bison aptitude git python-is-python3 tar perl wget curl lz4 device-tree-compiler libssl-dev

      - name: Clone ZyC Clang
        run: |
          mkdir -p zyc-clang
          curl -L -o Clang.tar.gz https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250607-release/Clang-21.0.0git-20250607.tar.gz
          tar -xf Clang.tar.gz -C zyc-clang --strip-components=1

      - name: Set Environment Variables
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/zyc-clang" >> $GITHUB_ENV
          echo "BUILD_USER=fannndi" >> $GITHUB_ENV
          echo "BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Send Telegram Notification - Build Started
        run: |
          CLANG_VER=$(./zyc-clang/bin/clang --version | head -n 1)
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -d text="🚀 *Build Dimulai!* | *Clang*: ${CLANG_VER}" \
            -d parse_mode=Markdown

      - name: Set Build Start Time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Clean Build Output
        run: |
          make O=out ARCH=arm64 clean
          make O=out ARCH=arm64 mrproper

      - name: Make Defconfig
        run: |
          make O=out ARCH=arm64 ${KERNEL_DEFCONFIG}

      - name: Build Kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LD=ld.lld \
            AS=llvm-as \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            DTC_EXT=dtc \
            KBUILD_COMPILER_STRING="${CLANG_VER}" \
            KBUILD_BUILD_USER=${BUILD_USER} \
            KBUILD_BUILD_HOST=${BUILD_HOST} 2>&1 | tee log.txt
        continue-on-error: true

      - name: Check Kernel Output Files
        run: |
          if [[ ! -f out/arch/arm64/boot/Image.gz ]]; then
            echo "Build failed: Missing Image.gz"
            touch BUILD_FAILED
          fi

      - name: Fetch AnyKernel3 and Package
        if: always()
        run: |
          if [[ -f out/arch/arm64/boot/Image.gz ]]; then
            git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3.git -b FSociety AnyKernel3
            cp out/arch/arm64/boot/Image.gz AnyKernel3/
            cp out/arch/arm64/boot/dtbo.img AnyKernel3/ || true
            cp out/arch/arm64/boot/dtb.img AnyKernel3/ || true
            cd AnyKernel3
            zip -r9 ../Surya-Kernel-${{ env.BUILD_TIME }}.zip ./*
          fi

      - name: Send Build Result to Telegram
        if: always()
        run: |
          if [[ -f BUILD_FAILED ]]; then
            STATUS="❌ *Build Gagal!*"
          else
            STATUS="✅ *Build Sukses!*"
          fi

          if [[ -f log.txt ]]; then
            curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument \
              -F chat_id=${{ env.TELEGRAM_CHAT_ID }} \
              -F document=@log.txt \
              -F caption="${STATUS}\n🧾 Berikut log build kernel Surya." \
              -F parse_mode=Markdown
          fi

          if [[ -f Surya-Kernel-${{ env.BUILD_TIME }}.zip ]]; then
            curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument \
              -F chat_id=${{ env.TELEGRAM_CHAT_ID }} \
              -F document=@Surya-Kernel-${{ env.BUILD_TIME }}.zip \
              -F caption="🎉 File ZIP kernel hasil build" \
              -F parse_mode=Markdown
          fi
