name: BuildJet Kernel

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Surya Kernel
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      - name: Set Timezone to Asia/Jakarta
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Jakarta date '+%d%m%Y-%H%M')" >> $GITHUB_ENV
          sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

      - name: Setup Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y \
            bc bison flex cpio rsync zip \
            build-essential libssl-dev \
            libelf-dev libncurses5-dev libffi-dev \
            clang llvm lld gcc g++ \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            python-is-python3 python3 python2 \
            curl wget git zstd lz4 pigz jq git-lfs ccache unzip

      - name: Build OpenSSL 1.1.1
        run: |
          mkdir -p $HOME/openssl-1.1.1-install && cd $HOME
          wget https://www.openssl.org/source/old/1.1.1/openssl-1.1.1.tar.gz
          tar -xzvf openssl-1.1.1.tar.gz && cd openssl-1.1.1
          ./config --prefix=$HOME/openssl-1.1.1-install shared zlib
          make -j$(nproc) && make install
          echo "$HOME/openssl-1.1.1-install/lib" | sudo tee /etc/ld.so.conf.d/openssl-1.1.1.conf
          sudo ldconfig
          echo "$HOME/openssl-1.1.1-install/bin" >> $GITHUB_PATH

      - name: Clone ZyC Clang
        run: |
          mkdir zyc-clang
          curl -LO https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250607-release/Clang-21.0.0git-20250607.tar.gz
          tar -xf Clang-21.0.0git-20250607.tar.gz -C zyc-clang/

      - name: Export Environment Variables
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "TOOLCHAIN=$PWD/zyc-clang" >> $GITHUB_ENV
          echo "PATH=$PWD/zyc-clang/bin:$PATH" >> $GITHUB_ENV
          echo "BUILD_USER=fannndi" >> $GITHUB_ENV
          echo "BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "KBUILD_COMPILER_STRING=$($PWD/zyc-clang/bin/clang --version | head -n1)" >> $GITHUB_ENV

      - name: Notify Telegram - Build Started
        run: |
          CLANG_VER=$(${{ env.TOOLCHAIN }}/bin/clang --version | head -n1)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 *Build Dimulai!* | *Clang*: ${CLANG_VER}" \
            -d parse_mode=Markdown

      - name: Set Build Start Time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make Defconfig
        run: |
          make O=out ARCH=arm64 ${{ env.KERNEL_DEFCONFIG }}

      - name: Build Kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LD=ld.lld \
            AS=llvm-as \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            KBUILD_BUILD_USER=${{ env.BUILD_USER }} \
            KBUILD_BUILD_HOST=${{ env.BUILD_HOST }} 2>&1 | tee log.txt
        continue-on-error: true

      - name: Upload Build Log to Telegram on Failure
        if: failure()
        run: |
          curl -s -F document=@log.txt \
            -F caption="❌ *Build Gagal!* Berikut log-nya 🧾" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Check Kernel Output
        run: |
          [[ -f out/arch/arm64/boot/Image.gz ]] || { echo "❌ Image.gz tidak ditemukan!"; exit 1; }

      - name: Clone AnyKernel3 and Package
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3.git -b FSociety AnyKernel3
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${{ env.BUILD_TIME }}.zip ./*

      - name: Send Flashable Zip to Telegram
        run: |
          curl -s -F document=@Surya-Kernel-${{ env.BUILD_TIME }}.zip \
            -F caption="✅ *Build Sukses!* Kernel untuk *Surya*\n🔧 Clang: ZyC 21.0.0\n🔐 OpenSSL: 1.1.1\n🕐 Waktu: ${{ env.BUILD_TIME }}" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}
