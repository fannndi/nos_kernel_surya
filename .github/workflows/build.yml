name: Build Kernel

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Jakarta

jobs:
  build:
    name: Build Kernel Surya
    runs-on: ubuntu-latest

    steps:
      - name: Set timezone
        run: sudo ln -sf /usr/share/zoneinfo/$TZ /etc/localtime

      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache bc cpio flex bison git python-is-python3 lz4 libssl-dev

      - name: Clone ZyC Clang
        run: |
          curl -L -o clang.tar.gz https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250129-release/Clang-20.0.0git-20250129.tar.gz
          mkdir -p zyc-clang && tar -xf clang.tar.gz -C zyc-clang --strip-components=1

      - name: Configure build env
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=mahirooo" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/zyc-clang" >> $GITHUB_ENV
          echo "PATH=$(pwd)/zyc-clang/bin:/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Configure ccache
        run: |
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 2G
          ccache -z

      - name: Notify Telegram - Build Started
        run: |
          CLANG_VERSION=$($TOOLCHAIN/bin/clang --version | head -n 1)
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="🚀 *Build Dimulai!*\n🧠 *Clang*: $CLANG_VERSION\n🕒 $(TZ=Asia/Jakarta date)" \
            -d parse_mode=Markdown

      - name: Set start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make defconfig
        run: |
          make O=out ARCH=arm64 ${KERNEL_DEFCONFIG}

      - name: Build kernel with ccache
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            KBUILD_COMPILER_STRING=$TOOLCHAIN \
            KBUILD_BUILD_USER=$KBUILD_BUILD_USER \
            KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST \
            2>&1 | tee log.txt

      - name: Check ccache stats
        run: |
          ccache -s

      - name: Check kernel output
        run: |
          test -f out/arch/arm64/boot/Image.gz || exit 1
          test -f out/arch/arm64/boot/dtbo.img || exit 1

      - name: Set duration
        run: |
          BUILD_END=$(date +%s)
          echo "BUILD_DURATION=$((BUILD_END - $BUILD_START))" >> $GITHUB_ENV

      - name: Notify Telegram - Build Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument \
            -F chat_id=${TELEGRAM_CHAT_ID} \
            -F document=@log.txt \
            -F caption="❌ *Build Gagal!*\nLihat log berikut." \
            -F parse_mode=Markdown

      - name: Clone AnyKernel3 and package
        if: success()
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f out/arch/arm64/boot/dtb.img ] && cp out/arch/arm64/boot/dtb.img AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${BUILD_TIME}.zip ./*

      - name: Send Telegram - Success
        if: success()
        run: |
          curl -F document=@Surya-Kernel-${BUILD_TIME}.zip \
            -F caption="✅ *Build Berhasil!*\n📦 Output: Surya-Kernel-${BUILD_TIME}.zip\n🕒 Durasi: $(( $BUILD_DURATION / 60 ))m $(( $BUILD_DURATION % 60 ))s" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}
