name: Build Kernel Optimized

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Jakarta

jobs:
  setup:
    name: Setup Environment and Toolchains
    runs-on: ubuntu-latest
    outputs:
      clang-path: ${{ steps.set-env.outputs.clang-path }}
      gcc64-path: ${{ steps.set-env.outputs.gcc64-path }}
      gcc32-path: ${{ steps.set-env.outputs.gcc32-path }}
      ccache-dir: ${{ steps.set-env.outputs.ccache-dir }}

    steps:
      - name: Set timezone
        run: sudo ln -sf /usr/share/zoneinfo/$TZ /etc/localtime

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc cpio flex bison libssl-dev ccache python-is-python3 git lz4 lld llvm curl zip

      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/kernel/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Cache clang toolchain
        uses: actions/cache@v3
        with:
          path: clang
          key: clang-${{ runner.os }}-v21

      - name: Cache gcc64 toolchain
        uses: actions/cache@v3
        with:
          path: gcc64
          key: gcc64-${{ runner.os }}-v19

      - name: Cache gcc32 toolchain
        uses: actions/cache@v3
        with:
          path: gcc32
          key: gcc32-${{ runner.os }}-v19

      - name: Clone Toolchains in parallel
        run: |
          [[ -d clang ]] || git clone --depth=1 -b clang-21.0 https://gitlab.com/kutemeikito/rastamod69-clang clang &
          [[ -d gcc64 ]] || git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc64 &
          [[ -d gcc32 ]] || git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc32 &
          wait

      - name: Export environment variables
        id: set-env
        run: |
          echo "clang-path=$(pwd)/clang" >> $GITHUB_OUTPUT
          echo "gcc64-path=$(pwd)/gcc64" >> $GITHUB_OUTPUT
          echo "gcc32-path=$(pwd)/gcc32" >> $GITHUB_OUTPUT
          echo "ccache-dir=$(pwd)/.ccache" >> $GITHUB_OUTPUT
          echo "Setup done."

      - name: Check resources (initial)
        run: |
          echo "CPU cores: $(nproc)"
          free -h
          df -h

  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    needs: setup

    env:
      KERNEL_DEFCONFIG: surya_defconfig
      KBUILD_BUILD_USER: mahirooo
      KBUILD_BUILD_HOST: android-build
      BUILD_START: ${{ github.event.workflow_dispatch.timestamp }}
      CLANG_PATH: ${{ needs.setup.outputs.clang-path }}
      GCC64_PATH: ${{ needs.setup.outputs.gcc64-path }}
      GCC32_PATH: ${{ needs.setup.outputs.gcc32-path }}
      CCACHE_DIR: ${{ needs.setup.outputs.ccache-dir }}
      BUILD_TIME: ${{ github.run_id }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup ccache
        run: |
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 5G
          ccache -z
          export CCACHE_COMPRESS=1
          echo "ccache ready with compression"

      - name: Notify Telegram - Build Started
        run: |
          CLANG_VERSION=$($CLANG_PATH/bin/clang --version | head -n1)
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -d text="🚀 *Build Dimulai!*\n🧠 *Clang*: $CLANG_VERSION\n🧑‍💻 User: ${{ github.actor }}\n🔀 Commit: ${{ github.sha }}\n🕒 $(TZ=Asia/Jakarta date)" \
            -d parse_mode=Markdown

      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make defconfig
        run: |
          echo "Running make defconfig: $KERNEL_DEFCONFIG"
          make O=out ARCH=arm64 $KERNEL_DEFCONFIG

      - name: Build kernel with log
        id: build_kernel
        run: |
          set -o pipefail
          export PATH=$CLANG_PATH/bin:$PATH
          export KBUILD_BUILD_USER=$KBUILD_BUILD_USER
          export KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST
          export CROSS_COMPILE=$GCC64_PATH/bin/aarch64-linux-android-
          export CROSS_COMPILE_COMPAT=$GCC32_PATH/bin/arm-linux-androideabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          echo "Start building kernel..."
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=$GCC64_PATH/bin/aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=$GCC32_PATH/bin/arm-linux-androideabi- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip READELF=llvm-readelf \
            2>&1 | tee log.txt
          echo "::set-output name=status::0"

      - name: Check build result
        run: |
          if ! test -f out/arch/arm64/boot/Image.gz; then
            echo "Kernel Image.gz not found!"
            exit 1
          fi
          if ! test -f out/arch/arm64/boot/dtbo.img; then
            echo "dtbo.img not found!"
            exit 1
          fi
          echo "Kernel output files found."

      - name: Check ccache stats
        run: ccache -s

      - name: Check resources after build
        run: |
          echo "Resources after build:"
          free -h
          df -h

      - name: Clone AnyKernel3 and package zip
        run: |
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety AnyKernel3
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f out/arch/arm64/boot/dtb.img ] && cp out/arch/arm64/boot/dtb.img AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${BUILD_TIME}.zip ./*
          cd ..

      - name: Calculate build duration
        run: |
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - $BUILD_START))
          echo "BUILD_DURATION=$BUILD_DURATION" >> $GITHUB_ENV
          echo "Build duration: $BUILD_DURATION seconds"

      - name: Send Telegram - Build Success with artifact
        if: success()
        run: |
          curl -F document=@Surya-Kernel-${BUILD_TIME}.zip \
            -F caption="✅ *Build Berhasil!*\n📦 Output: Surya-Kernel-${BUILD_TIME}.zip\n👤 User: ${{ github.actor }}\n🕒 Durasi: $(( BUILD_DURATION / 60 ))m $(( BUILD_DURATION % 60 ))s" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ env.TELEGRAM_CHAT_ID }}

      - name: Check log.txt existence before upload on failure
        if: failure()
        run: |
          echo "Checking if log.txt exists..."
          ls -lh log.txt || echo "log.txt not found!"

      - name: Send Telegram - Build Failed with log file
        if: failure()
        run: |
          curl -F document=@log.txt \
            -F caption="❌ *Build Gagal!*\n📄 Log terlampir.\n🕒 $(TZ=Asia/Jakarta date)" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ env.TELEGRAM_CHAT_ID }}
