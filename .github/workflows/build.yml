name: BuildJet Kernel

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    name: Build Surya Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      - name: Prepare timezone
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Jakarta date '+%d%m%Y-%H%M')" >> $GITHUB_ENV
          sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

      - name: Install Dependencies
        run: |
          sudo apt update -y && sudo apt upgrade -y
          sudo apt install -y \
            build-essential checkinstall \
            bc bison flex \
            libelf-dev libncurses5-dev libffi-dev \
            libreadline-dev libbz2-dev libsqlite3-dev zlib1g-dev \
            git curl wget zip zstd cpio pigz rsync jq \
            nano ca-certificates ssh \
            clang llvm lld gcc g++ \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            python-is-python3 python2 python3 \
            ccache git-lfs lz4 lzop \
            neofetch
          neofetch

      - name: Build and Install OpenSSL 1.1.1
        run: |
          mkdir -p $HOME/openssl-1.1.1-install && cd $HOME
          wget https://www.openssl.org/source/old/1.1.1/openssl-1.1.1.tar.gz
          tar -xzvf openssl-1.1.1.tar.gz
          cd openssl-1.1.1
          ./config --prefix=$HOME/openssl-1.1.1-install --openssldir=$HOME/openssl-1.1.1-install shared zlib
          make -j$(nproc)
          make install
          cd $HOME
          rm -rf openssl-1.1.1 openssl-1.1.1.tar.gz

      - name: Set OpenSSL Environment Variables
        run: |
          echo "PATH=$HOME/openssl-1.1.1-install/bin:$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$HOME/openssl-1.1.1-install/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$HOME/openssl-1.1.1-install/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Clone ZyC Clang (v21.0.0)
        run: |
          mkdir -p zyc-clang
          curl -L -o Clang-21.0.0git-20250607.tar.gz https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250607-release/Clang-21.0.0git-20250607.tar.gz
          tar -xf Clang-21.0.0git-20250607.tar.gz -C zyc-clang --strip-components=1

      - name: Set Environment Variables
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/zyc-clang" >> $GITHUB_ENV
          echo "BUILD_USER=mahirooo" >> $GITHUB_ENV
          echo "BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Send Telegram Notification - Build Started
        env:
          PATH: ${{ env.TOOLCHAIN }}/bin:${{ env.PATH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CLANG_VER=$(clang --version | head -n 1)
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d text="🚀 *Build Dimulai!* | *Clang*: ${CLANG_VER}" \
            -d parse_mode=Markdown

      - name: Set Build Start Time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Clean Build Output
        env:
          PATH: ${{ env.TOOLCHAIN }}/bin:${{ env.PATH }}
        run: |
          make O=out ARCH=arm64 clean
          make O=out ARCH=arm64 mrproper

      - name: Make Defconfig
        env:
          PATH: ${{ env.TOOLCHAIN }}/bin:${{ env.PATH }}
          KERNEL_DEFCONFIG: ${{ env.KERNEL_DEFCONFIG }}
        run: |
          make O=out ARCH=arm64 $KERNEL_DEFCONFIG

      - name: Build Kernel
        env:
          PATH: ${{ env.TOOLCHAIN }}/bin:${{ env.PATH }}
          BUILD_USER: ${{ env.BUILD_USER }}
          BUILD_HOST: ${{ env.BUILD_HOST }}
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LD=ld.lld \
            AS=llvm-as \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            DTC_EXT=dtc \
            KBUILD_COMPILER_STRING="$(clang --version | head -n 1)" \
            KBUILD_BUILD_USER=${BUILD_USER} \
            KBUILD_BUILD_HOST=${BUILD_HOST} 2>&1 | tee log.txt
        continue-on-error: true

      - name: Check Kernel Output Files
        run: |
          if [[ ! -f out/arch/arm64/boot/Image.gz ]] || [[ ! -f out/arch/arm64/boot/dtbo.img ]] || [[ ! -f out/arch/arm64/boot/dtb.img ]]; then
            echo "❌ Kernel output files missing."
            exit 1
          fi

      - name: Send Telegram Notification - Build Failed (if failed)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f log.txt ]; then
            curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument \
              -F chat_id=${TELEGRAM_CHAT_ID} \
              -F document=@log.txt \
              -F caption="❌ Build kernel *gagal*! Berikut log-nya 🧾." \
              -F parse_mode=Markdown
          else
            echo "❌ log.txt not found!"
          fi

      - name: Fetch AnyKernel3 and Package
        if: success()
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3.git -b FSociety AnyKernel3
          cp out/arch/arm64/boot/Image.gz AnyKernel3/Image.gz
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/dtbo.img
          cp out/arch/arm64/boot/dtb.img AnyKernel3/dtb.img
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${{ env.BUILD_TIME }}.zip ./*

      - name: Send Build Success to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -F document=@Surya-Kernel-${{ env.BUILD_TIME }}.zip \
            -F caption="✅ Build Success with ZyC-Clang 21.0.0" \
            -F parse_mode=Markdown \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}"
