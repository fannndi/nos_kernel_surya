name: Build Kernel

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Jakarta

jobs:
  build:
    name: Build Kernel Surya
    runs-on: ubuntu-latest

    steps:
      - name: Set timezone
        run: sudo ln -sf /usr/share/zoneinfo/$TZ /etc/localtime

      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc cpio flex bison libssl-dev ccache python-is-python3 git lz4 lld llvm

      - name: Clone Toolchains (Clang + GCC)
        run: |
          git clone --depth=1 -b clang-21.0 https://gitlab.com/kutemeikito/rastamod69-clang clang
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc64
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc32

      - name: Set build environment
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=mahirooo" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "CLANG_PATH=$(pwd)/clang" >> $GITHUB_ENV
          echo "GCC64_PATH=$(pwd)/gcc64" >> $GITHUB_ENV
          echo "GCC32_PATH=$(pwd)/gcc32" >> $GITHUB_ENV
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "PATH=$(pwd)/clang/bin:\$PATH" >> $GITHUB_ENV

      - name: Configure ccache
        run: |
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 2G
          ccache -z

      - name: Notify Telegram - Build Started
        run: |
          CLANG_VERSION=$(clang --version | head -n1)
          COMMIT_ID=$(git log --oneline -n1 | cut -d ' ' -f1)
          COMMIT_MSG=$(git log --oneline -n1 | cut -d ' ' -f2-)
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d parse_mode=Markdown \
            -d text="🚀 *Build Dimulai!*

📦 *Kernel*: Surya Kernel
🧠 *Clang*: \`${CLANG_VERSION}\`
👤 *User*: \`${KBUILD_BUILD_USER}\`
💻 *Host*: \`${KBUILD_BUILD_HOST}\`
🔀 *Commit*: \`${COMMIT_ID}\` - ${COMMIT_MSG}
🕒 *Waktu*: $(TZ=Asia/Jakarta date +'%A, %d %B %Y %H:%M WIB')"

      - name: Set start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make defconfig
        run: |
          make O=out ARCH=arm64 ${KERNEL_DEFCONFIG}

      - name: Build kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=$GCC64_PATH/bin/aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=$GCC32_PATH/bin/arm-linux-androideabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            READELF=llvm-readelf \
            KBUILD_BUILD_USER=$KBUILD_BUILD_USER \
            KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST \
            2>&1 | tee log.txt

      - name: Check ccache stats
        run: ccache -s

      - name: Check kernel output
        run: |
          test -f out/arch/arm64/boot/Image.gz || exit 1
          test -f out/arch/arm64/boot/dtbo.img || exit 1

      - name: Set duration
        run: |
          BUILD_END=$(date +%s)
          echo "BUILD_DURATION=$((BUILD_END - $BUILD_START))" >> $GITHUB_ENV

      - name: Notify Telegram - Build Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument \
            -F chat_id=${TELEGRAM_CHAT_ID} \
            -F document=@log.txt \
            -F caption="❌ *Build Gagal!*\nLihat log berikut." \
            -F parse_mode=Markdown

      - name: Clone AnyKernel3 and package
        if: success()
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f out/arch/arm64/boot/dtb.img ] && cp out/arch/arm64/boot/dtb.img AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${BUILD_TIME}.zip ./*

      - name: Send Telegram - Success
        if: success()
        run: |
          curl -F document=@Surya-Kernel-${BUILD_TIME}.zip \
            -F caption="✅ *Build Berhasil!*\n📦 Output: Surya-Kernel-${BUILD_TIME}.zip\n🕒 Durasi: $(( $BUILD_DURATION / 60 ))m $(( $BUILD_DURATION % 60 ))s" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}
