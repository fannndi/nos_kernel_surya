name: Build Kernel Manual Debug

on:
  workflow_dispatch:

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TZ: Asia/Jakarta

jobs:
  build:
    name: Build Kernel Surya Manual
    runs-on: ubuntu-latest

    steps:
      - name: Set timezone
        run: sudo ln -sf /usr/share/zoneinfo/$TZ /etc/localtime

      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc cpio flex bison libssl-dev ccache python-is-python3 git lz4 lld llvm

      - name: Clone Toolchains (Clang + GCC)
        run: |
          git clone --depth=1 -b clang-21.0 https://gitlab.com/kutemeikito/rastamod69-clang clang
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc64
          git clone --depth=1 -b lineage-19.1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc32

      - name: Export build environment variables
        run: |
          export KERNEL_DEFCONFIG=surya_defconfig
          export KBUILD_BUILD_USER=mahirooo
          export KBUILD_BUILD_HOST=android-build
          export CLANG_PATH=$(pwd)/clang
          export GCC64_PATH=$(pwd)/gcc64
          export GCC32_PATH=$(pwd)/gcc32
          export CCACHE_DIR=$(pwd)/.ccache
          export BUILD_TIME=$(date +%Y%m%d-%H%M)
          echo "KERNEL_DEFCONFIG=$KERNEL_DEFCONFIG"
          echo "KBUILD_BUILD_USER=$KBUILD_BUILD_USER"
          echo "KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST"
          echo "CLANG_PATH=$CLANG_PATH"
          echo "GCC64_PATH=$GCC64_PATH"
          echo "GCC32_PATH=$GCC32_PATH"
          echo "CCACHE_DIR=$CCACHE_DIR"
          echo "BUILD_TIME=$BUILD_TIME"
          # Save variables to GITHUB_ENV so next steps can use if needed
          echo "KERNEL_DEFCONFIG=$KERNEL_DEFCONFIG" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=$KBUILD_BUILD_USER" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=$KBUILD_BUILD_HOST" >> $GITHUB_ENV
          echo "CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
          echo "GCC64_PATH=$GCC64_PATH" >> $GITHUB_ENV
          echo "GCC32_PATH=$GCC32_PATH" >> $GITHUB_ENV
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

      - name: Configure ccache
        run: |
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          ccache -M 2G
          ccache -z

      - name: Notify Telegram - Build Started
        run: |
          CLANG_VERSION=$($CLANG_PATH/bin/clang --version | head -n1)
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -d text="🚀 *Build Dimulai!*\n🧠 *Clang*: $CLANG_VERSION\n🕒 $(TZ=Asia/Jakarta date)" \
            -d parse_mode=Markdown

      - name: Set start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make defconfig
        run: |
          export KERNEL_DEFCONFIG=${{ env.KERNEL_DEFCONFIG }}
          echo "Running make defconfig: $KERNEL_DEFCONFIG"
          make O=out ARCH=arm64 $KERNEL_DEFCONFIG

      - name: Build kernel
        run: |
          export PATH=${{ env.CLANG_PATH }}/bin:$PATH
          export KBUILD_BUILD_USER=${{ env.KBUILD_BUILD_USER }}
          export KBUILD_BUILD_HOST=${{ env.KBUILD_BUILD_HOST }}
          export GCC64_PATH=${{ env.GCC64_PATH }}
          export GCC32_PATH=${{ env.GCC32_PATH }}
          echo "Start building kernel..."
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=$GCC64_PATH/bin/aarch64-linux-android- \
            CROSS_COMPILE_COMPAT=$GCC32_PATH/bin/arm-linux-androideabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            READELF=llvm-readelf || { echo "Build failed! Check errors above."; exit 1; }

      - name: Check ccache stats
        run: ccache -s

      - name: Check kernel output
        run: |
          echo "Checking if kernel output files exist..."
          test -f out/arch/arm64/boot/Image.gz || { echo "Image.gz missing!"; exit 1; }
          test -f out/arch/arm64/boot/dtbo.img || { echo "dtbo.img missing!"; exit 1; }

      - name: Set duration
        run: |
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - $BUILD_START))
          echo "BUILD_DURATION=$BUILD_DURATION" >> $GITHUB_ENV
          echo "Build duration: $BUILD_DURATION seconds"

      - name: Clone AnyKernel3 and package
        if: success()
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/
          [ -f out/arch/arm64/boot/dtb.img ] && cp out/arch/arm64/boot/dtb.img AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${{ env.BUILD_TIME }}.zip ./*

      - name: Send Telegram - Success
        if: success()
        run: |
          curl -F document=@Surya-Kernel-${{ env.BUILD_TIME }}.zip \
            -F caption="✅ *Build Berhasil!*\n📦 Output: Surya-Kernel-${{ env.BUILD_TIME }}.zip\n🕒 Durasi: $(( ${{ env.BUILD_DURATION }} / 60 ))m $(( ${{ env.BUILD_DURATION }} % 60 ))s" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ env.TELEGRAM_CHAT_ID }}

      - name: Send Telegram - Build Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument \
            -F chat_id=${{ env.TELEGRAM_CHAT_ID }} \
            -F document=@log.txt \
            -F caption="❌ *Build Gagal!*\nLihat log berikut." \
            -F parse_mode=Markdown
