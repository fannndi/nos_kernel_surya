name: BuildJet Kernel

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Surya Kernel
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      - name: Set Timezone
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Jakarta date '+%d%m%Y-%H%M')" >> $GITHUB_ENV
          sudo ln -sf /usr/share/zoneinfo/Asia/Jakarta /etc/localtime

      - name: Setup Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y bc cpio flex bison git python-is-python3 curl wget lz4 tar libssl-dev device-tree-compiler

      - name: Clone ZyC Clang
        run: |
          mkdir zyc-clang
          curl -LO https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250607-release/Clang-21.0.0git-20250607.tar.gz
          tar -C zyc-clang/ -xf Clang-21.0.0git-20250607.tar.gz

      - name: Set Environment Variables
        run: |
          echo "KERNEL_DEFCONFIG=surya_defconfig" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/zyc-clang" >> $GITHUB_ENV
          echo "PATH=$(pwd)/zyc-clang/bin:$PATH" >> $GITHUB_ENV
          echo "BUILD_USER=fannndi" >> $GITHUB_ENV
          echo "BUILD_HOST=android-build" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Telegram Notification - Build Started
        run: |
          CLANG_VER=$(${{ github.workspace }}/zyc-clang/bin/clang --version | head -n1)
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="🚀 *Build Dimulai!* \n🛠 Clang: ${CLANG_VER}" \
            -d parse_mode=Markdown

      - name: Set Build Start Time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Make Defconfig
        run: |
          make O=out ARCH=arm64 ${KERNEL_DEFCONFIG}

      - name: Build Kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            LD=ld.lld \
            AS=llvm-as \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            KBUILD_COMPILER_STRING="${PWD}/clang" \
            KBUILD_BUILD_USER=${BUILD_USER} \
            KBUILD_BUILD_HOST=${BUILD_HOST} 2>&1 | tee log.txt
        continue-on-error: true

      - name: Telegram Notification - Build Failed
        if: failure()
        run: |
          curl -s -F chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -F document=@log.txt \
            -F caption="❌ *Build gagal!* Cek log berikut." \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument

      - name: Check Kernel Output
        run: |
          [[ -f out/arch/arm64/boot/Image.gz ]] || (echo "❌ Image.gz tidak ditemukan" && exit 1)

      - name: Clone AnyKernel3 dan Buat ZIP
        run: |
          git clone --depth=1 https://github.com/rinnsakaguchi/AnyKernel3 -b FSociety AnyKernel3
          cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          zip -r9 ../Surya-Kernel-${{ env.BUILD_TIME }}.zip ./*

      - name: Telegram Notification - Success
        run: |
          curl -s -F chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -F document=@Surya-Kernel-${{ env.BUILD_TIME }}.zip \
            -F caption="✅ *Build Berhasil!* Kernel Surya siap 🎉" \
            -F parse_mode=Markdown \
            https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendDocument
